<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitCheck — Know your fit before you apply</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
          },
          colors: {
            fitcheck: {
              bg: '#0a0a0a',
              surface: '#111111',
              accent: '#00ff88',
              text: '#e2e2e2',
              muted: '#888888',
            },
          },
        },
      },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    html { scroll-behavior: smooth; }
    .terminal-glow {
      text-shadow: 0 0 12px rgba(0, 255, 136, 0.35);
    }
    .cursor-blink {
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    .bar-inner {
      transition: width 1.1s cubic-bezier(0.22, 1, 0.36, 1);
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .results-reveal {
      animation: fade-up 0.6s ease-out forwards;
    }
    .gauge-ring {
      transition: stroke-dashoffset 1s ease-out;
    }
    #report-md :where(h1, h2, h3) {
      font-weight: 600;
      margin-top: 1.25em;
      margin-bottom: 0.5em;
      color: #e2e2e2;
    }
    #report-md :where(p) {
      margin-bottom: 0.85em;
      line-height: 1.7;
    }
    #report-md :where(ul, ol) {
      margin: 0.75em 0 0.75em 1.25em;
      line-height: 1.65;
    }
    #report-md :where(code) {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.9em;
      background: #1a1a1a;
      padding: 0.15em 0.4em;
      border-radius: 4px;
    }
    #report-md :where(a) {
      color: #00ff88;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
  </style>
</head>
<body class="min-h-screen bg-fitcheck-bg text-fitcheck-text font-sans antialiased">
  <div class="flex min-h-screen flex-col lg:flex-row">
    <!-- Terminal panel -->
    <aside class="relative flex min-h-[42vh] flex-col border-b border-white/[0.06] lg:min-h-screen lg:w-1/2 lg:border-b-0 lg:border-r lg:border-white/[0.06]">
      <div class="absolute inset-0 bg-gradient-to-br from-fitcheck-accent/[0.03] to-transparent pointer-events-none" aria-hidden="true"></div>
      <div class="relative flex flex-1 flex-col p-8 lg:p-12">
        <p class="mb-4 font-mono text-xs uppercase tracking-[0.2em] text-fitcheck-muted">Live analysis</p>
        <div
          id="terminal"
          class="font-mono text-sm leading-relaxed text-fitcheck-accent/95 terminal-glow flex-1 overflow-y-auto rounded-lg border border-white/[0.06] bg-black/40 p-6 backdrop-blur-sm min-h-[200px] max-h-[min(60vh,720px)]"
          role="log"
          aria-live="polite"
        >
          <div id="terminal-lines" class="space-y-1"></div>
          <div id="terminal-cursor-row" class="mt-2 flex items-center gap-0.5 text-fitcheck-accent">
            <span id="terminal-prompt" class="select-none">&gt;</span>
            <span id="terminal-current-text"></span><span id="terminal-caret" class="inline-block h-4 w-2 bg-fitcheck-accent cursor-blink align-[-2px]" aria-hidden="true"></span>
          </div>
        </div>
      </div>
    </aside>

    <!-- Input + results -->
    <main class="flex flex-1 flex-col lg:w-1/2">
      <div class="flex flex-1 flex-col px-8 py-10 lg:px-14 lg:py-14 lg:max-w-2xl lg:mx-auto w-full">
        <header class="mb-10">
          <h1 class="text-lg font-medium tracking-tight text-fitcheck-text">FitCheck</h1>
          <p class="mt-1 text-sm text-fitcheck-muted">Know your fit before you apply</p>
        </header>

        <form id="analyze-form" class="space-y-6">
          <div>
            <label for="company" class="mb-2 block text-xs font-medium uppercase tracking-wider text-fitcheck-muted">Company name</label>
            <input
              id="company"
              name="company"
              type="text"
              autocomplete="organization"
              required
              placeholder="e.g. Acme AI"
              class="w-full rounded-lg border border-white/[0.08] bg-fitcheck-surface px-4 py-3 text-fitcheck-text placeholder:text-fitcheck-muted/60 outline-none transition focus:border-fitcheck-accent/50 focus:ring-1 focus:ring-fitcheck-accent/30"
            />
          </div>
          <div>
            <label for="jd" class="mb-2 block text-xs font-medium uppercase tracking-wider text-fitcheck-muted">Job description</label>
            <textarea
              id="jd"
              name="jd"
              required
              rows="8"
              minlength="10"
              placeholder="Paste the job description..."
              class="w-full resize-y rounded-lg border border-white/[0.08] bg-fitcheck-surface px-4 py-3 text-fitcheck-text placeholder:text-fitcheck-muted/60 outline-none transition focus:border-fitcheck-accent/50 focus:ring-1 focus:ring-fitcheck-accent/30 min-h-[12rem]"
            ></textarea>
          </div>
          <button
            type="submit"
            id="analyze-btn"
            class="group w-full rounded-lg bg-fitcheck-accent py-3.5 text-center text-sm font-semibold text-fitcheck-bg transition hover:brightness-110 hover:shadow-[0_0_24px_rgba(0,255,136,0.25)] active:scale-[0.99] disabled:opacity-50 disabled:pointer-events-none"
          >
            Analyze Fit <span class="inline-block transition-transform group-hover:translate-x-0.5">→</span>
          </button>
        </form>

        <!-- Results -->
        <section id="results" class="mt-12 hidden opacity-0 transition-opacity duration-700 ease-out">
          <div id="results-card" class="rounded-xl border border-white/[0.08] bg-fitcheck-surface/80 p-8">
            <div class="flex flex-col items-center gap-6 sm:flex-row sm:items-start sm:justify-between">
              <div class="relative flex h-36 w-36 shrink-0 items-center justify-center">
                <svg class="h-36 w-36 -rotate-90 text-current" viewBox="0 0 100 100" aria-hidden="true">
                  <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="6" />
                  <circle
                    id="gauge-arc"
                    class="gauge-ring"
                    cx="50"
                    cy="50"
                    r="42"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="6"
                    stroke-linecap="round"
                    stroke-dasharray="263.9"
                    stroke-dashoffset="263.9"
                  />
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center text-center">
                  <span id="score-main" class="text-4xl font-semibold tabular-nums tracking-tight">—</span>
                  <span class="text-sm text-fitcheck-muted">/100</span>
                </div>
              </div>
              <div class="flex-1 text-center sm:text-left w-full">
                <p id="result-company" class="text-sm text-fitcheck-muted"></p>
                <span id="rec-badge" class="mt-3 inline-flex rounded-full px-3 py-1 text-xs font-medium"></span>
              </div>
            </div>

            <div class="mt-8 space-y-4">
              <div>
                <div class="mb-1 flex justify-between text-xs text-fitcheck-muted"><span>Technical</span><span id="dim-tech-val" class="font-mono text-fitcheck-text/80"></span></div>
                <div class="h-1.5 overflow-hidden rounded-full bg-white/[0.06]">
                  <div id="dim-tech-bar" class="bar-inner h-full rounded-full w-0 bg-fitcheck-accent/80"></div>
                </div>
              </div>
              <div>
                <div class="mb-1 flex justify-between text-xs text-fitcheck-muted"><span>Domain</span><span id="dim-domain-val" class="font-mono text-fitcheck-text/80"></span></div>
                <div class="h-1.5 overflow-hidden rounded-full bg-white/[0.06]">
                  <div id="dim-domain-bar" class="bar-inner h-full rounded-full w-0 bg-fitcheck-accent/70"></div>
                </div>
              </div>
              <div>
                <div class="mb-1 flex justify-between text-xs text-fitcheck-muted"><span>Experience</span><span id="dim-exp-val" class="font-mono text-fitcheck-text/80"></span></div>
                <div class="h-1.5 overflow-hidden rounded-full bg-white/[0.06]">
                  <div id="dim-exp-bar" class="bar-inner h-full rounded-full w-0 bg-fitcheck-accent/60"></div>
                </div>
              </div>
            </div>

            <blockquote id="reasoning-box" class="mt-8 hidden border-l-2 border-fitcheck-accent/40 bg-black/25 py-3 pl-4 pr-2 text-sm italic leading-relaxed text-fitcheck-text/85"></blockquote>

            <div class="mt-10 border-t border-white/[0.06] pt-8">
              <h2 class="mb-4 text-xs font-medium uppercase tracking-wider text-fitcheck-muted">Full report</h2>
              <div id="report-md" class="prose prose-invert max-w-none text-sm text-fitcheck-text/90"></div>
            </div>

            <div class="mt-10 border-t border-white/[0.06] pt-8">
              <h3 class="text-sm font-medium text-fitcheck-text">Hiring manager? I'd love to know what you're thinking.</h3>
              <div id="feedback-wrap" class="mt-4 flex flex-col gap-3 sm:flex-row">
                <input
                  id="feedback-q"
                  type="text"
                  placeholder="Ask anything or share feedback…"
                  class="flex-1 rounded-lg border border-white/[0.08] bg-fitcheck-bg px-4 py-2.5 text-sm text-fitcheck-text placeholder:text-fitcheck-muted/50 outline-none focus:border-fitcheck-accent/40"
                />
                <button
                  type="button"
                  id="feedback-send"
                  class="rounded-lg border border-fitcheck-accent/40 px-5 py-2.5 text-sm font-medium text-fitcheck-accent transition hover:bg-fitcheck-accent/10"
                >
                  Send
                </button>
              </div>
              <p id="feedback-thanks" class="mt-4 hidden text-sm text-fitcheck-muted">Thanks — noted.</p>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script>
    (function () {
      const AMBIENT_LINES = [
        'scanning role requirements...',
        'cross-referencing candidate profile...',
        'computing fit vectors...',
        'indexing JD skill graph...',
        'reconciling stack signals...',
        'calibrating seniority band...',
      ];

      const terminalLines = document.getElementById('terminal-lines');
      const terminalCurrentText = document.getElementById('terminal-current-text');
      const terminalCursorRow = document.getElementById('terminal-cursor-row');
      const resultsCard = document.getElementById('results-card');
      const form = document.getElementById('analyze-form');
      const companyInput = document.getElementById('company');
      const jdInput = document.getElementById('jd');
      const analyzeBtn = document.getElementById('analyze-btn');
      const resultsEl = document.getElementById('results');
      const scoreMain = document.getElementById('score-main');
      const resultCompany = document.getElementById('result-company');
      const recBadge = document.getElementById('rec-badge');
      const gaugeArc = document.getElementById('gauge-arc');
      const reportMd = document.getElementById('report-md');
      const reasoningBox = document.getElementById('reasoning-box');
      const feedbackQ = document.getElementById('feedback-q');
      const feedbackSend = document.getElementById('feedback-send');
      const feedbackThanks = document.getElementById('feedback-thanks');
      const feedbackWrap = document.getElementById('feedback-wrap');

      const C = 2 * Math.PI * 42;

      let ambientActive = true;
      let ambientLineIndex = 0;
      let ambientCharIndex = 0;
      let ambientTimer = null;
      let liveMode = false;
      let typingLineEl = null;
      let sseAbort = null;

      function setGaugeColor(score) {
        const n = Number(score) || 0;
        let color = '#ef4444';
        if (n >= 80) color = '#00ff88';
        else if (n >= 65) color = '#fbbf24';
        gaugeArc.style.color = color;
      }

      function setScoreUI(score, fitScore, company, report) {
        const n = Math.max(0, Math.min(100, Number(score) || 0));
        scoreMain.textContent = String(Math.round(n));
        resultCompany.textContent = company || '';
        setGaugeColor(n);
        requestAnimationFrame(() => {
          gaugeArc.style.strokeDashoffset = String(C * (1 - n / 100));
        });

        const rec = (fitScore && fitScore.recommendation) || '—';
        recBadge.textContent = rec;
        recBadge.className = 'mt-3 inline-flex rounded-full px-3 py-1 text-xs font-medium ';
        if (n >= 80) recBadge.className += 'bg-emerald-500/15 text-emerald-300';
        else if (n >= 65) recBadge.className += 'bg-amber-500/15 text-amber-200';
        else recBadge.className += 'bg-red-500/15 text-red-300';

        const b = (fitScore && fitScore.breakdown) || {};
        const tech = Number(b.technical) || 0;
        const dom = Number(b.domain) || 0;
        const exp = Number(b.experience) || 0;

        document.getElementById('dim-tech-val').textContent = tech + '/10';
        document.getElementById('dim-domain-val').textContent = dom + '/10';
        document.getElementById('dim-exp-val').textContent = exp + '/10';

        const barTone =
          n >= 80 ? 'bg-emerald-400/85' : n >= 65 ? 'bg-amber-400/85' : 'bg-red-400/80';
        const setBar = (id, v) => {
          const el = document.getElementById(id);
          el.className = 'bar-inner h-full rounded-full ' + barTone;
          el.style.width = '0%';
          void el.offsetWidth;
          el.style.width = Math.min(100, Math.max(0, v * 10)) + '%';
        };
        setBar('dim-tech-bar', tech);
        setBar('dim-domain-bar', dom);
        setBar('dim-exp-bar', exp);

        const reason = fitScore && fitScore.reasoning;
        if (reason) {
          reasoningBox.textContent = '"' + reason + '"';
          reasoningBox.classList.remove('hidden');
        } else {
          reasoningBox.classList.add('hidden');
        }

        reportMd.innerHTML = marked.parse(report || '_No report text._', { breaks: true });

        resultsCard.classList.remove('results-reveal');
        void resultsCard.offsetWidth;

        resultsEl.classList.remove('hidden');
        resultsEl.classList.add('opacity-0');
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            resultsEl.classList.remove('opacity-0');
            resultsEl.classList.add('opacity-100');
            resultsCard.classList.add('results-reveal');
          });
        });
      }

      function stopAmbient() {
        ambientActive = false;
        if (ambientTimer) clearTimeout(ambientTimer);
        ambientTimer = null;
      }

      function startAmbient() {
        ambientActive = true;
        ambientLineIndex = 0;
        ambientCharIndex = 0;
        terminalLines.innerHTML = '';
        liveMode = false;
        terminalCursorRow.classList.remove('hidden');
        runAmbientTick();
      }

      function runAmbientTick() {
        if (!ambientActive || liveMode) return;
        const line = AMBIENT_LINES[ambientLineIndex % AMBIENT_LINES.length];
        if (ambientCharIndex <= line.length) {
          terminalCurrentText.textContent = line.slice(0, ambientCharIndex);
          ambientCharIndex++;
          ambientTimer = setTimeout(runAmbientTick, ambientCharIndex > line.length ? 900 : 42 + Math.random() * 28);
        } else {
          const div = document.createElement('div');
          div.className = 'text-fitcheck-accent/90';
          div.textContent = '> ' + line;
          terminalLines.appendChild(div);
          terminalLines.scrollTop = terminalLines.scrollHeight;
          terminalCurrentText.textContent = '';
          ambientCharIndex = 0;
          ambientLineIndex++;
          if (terminalLines.children.length > 12) terminalLines.removeChild(terminalLines.firstChild);
          ambientTimer = setTimeout(runAmbientTick, 400);
        }
      }

      function enterLiveMode() {
        stopAmbient();
        liveMode = true;
        terminalLines.innerHTML = '';
        terminalCurrentText.textContent = '';
        typingLineEl = null;
        terminalCursorRow.classList.add('hidden');
      }

      function finalizeCurrentTypingLine() {
        if (!typingLineEl) return;
        const c = typingLineEl.querySelector('.line-caret');
        if (c) c.remove();
        typingLineEl = null;
      }

      function ensureTypingLine() {
        finalizeCurrentTypingLine();
        typingLineEl = document.createElement('div');
        typingLineEl.className = 'text-fitcheck-accent/95 flex items-start gap-1';
        typingLineEl.innerHTML =
          '<span class="select-none shrink-0">&gt;</span><span class="typing-target"></span><span class="line-caret inline-block h-3.5 w-1.5 bg-fitcheck-accent cursor-blink shrink-0 mt-0.5 ml-0.5"></span>';
        terminalLines.appendChild(typingLineEl);
        return typingLineEl.querySelector('.typing-target');
      }

      function typeTextInto(el, fullText, done) {
        let i = 0;
        function step() {
          if (i <= fullText.length) {
            el.textContent = fullText.slice(0, i);
            i++;
            terminalLines.scrollTop = terminalLines.scrollHeight;
            setTimeout(step, i > fullText.length ? 0 : 22 + Math.random() * 18);
          } else if (done) done();
        }
        step();
      }

      function appendStepLabel(label) {
        const target = ensureTypingLine();
        typeTextInto(target, label, () => {
          finalizeCurrentTypingLine();
        });
      }

      function showCompleteLine() {
        finalizeCurrentTypingLine();
        const row = document.createElement('div');
        row.className = 'mt-3 flex items-center gap-2 text-fitcheck-accent';
        row.innerHTML = '<span>&gt; Analysis complete.</span><span class="text-lg" aria-hidden="true">✓</span>';
        terminalLines.appendChild(row);
        terminalCursorRow.classList.add('hidden');
        terminalLines.scrollTop = terminalLines.scrollHeight;
      }

      function showErrorLine(msg) {
        finalizeCurrentTypingLine();
        const row = document.createElement('div');
        row.className = 'mt-2 text-red-400/90 font-mono text-sm';
        row.textContent = '> ' + (msg || 'Something went wrong.');
        terminalLines.appendChild(row);
        terminalLines.scrollTop = terminalLines.scrollHeight;
      }

      async function readSSEStream(response, onEvent) {
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split('\n\n');
          buffer = parts.pop() || '';
          for (const chunk of parts) {
            const lines = chunk.split('\n');
            for (const line of lines) {
              if (line.startsWith('data:')) {
                const json = line.slice(5).trim();
                try {
                  onEvent(JSON.parse(json));
                } catch (e) {
                  console.warn('SSE parse', e);
                }
              }
            }
          }
        }
      }

      startAmbient();

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const company_name = companyInput.value.trim();
        const jd_text = jdInput.value.trim();
        if (!company_name || !jd_text) return;

        if (sseAbort) sseAbort.abort();
        sseAbort = new AbortController();

        analyzeBtn.disabled = true;
        enterLiveMode();
        resultsEl.classList.add('hidden', 'opacity-0');
        resultsEl.classList.remove('opacity-100');
        feedbackThanks.classList.add('hidden');
        feedbackWrap.classList.remove('hidden');
        feedbackQ.value = '';

        try {
          const res = await fetch('/analyze/stream', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Accept: 'text/event-stream' },
            body: JSON.stringify({ company_name, jd_text }),
            signal: sseAbort.signal,
          });

          if (!res.ok) {
            showErrorLine('Request failed (' + res.status + ').');
            analyzeBtn.disabled = false;
            startAmbient();
            return;
          }

          await readSSEStream(res, (data) => {
            if (data.type === 'step' && data.label) {
              appendStepLabel(data.label);
            } else if (data.type === 'complete' && data.result) {
              showCompleteLine();
              const r = data.result;
              const fs = r.fit_score || {};
              const overall = fs.overall_score;
              setScoreUI(overall, fs, r.company, r.report);
              if (r.error) showErrorLine(r.error);
            } else if (data.type === 'error') {
              showErrorLine(data.message || 'Analysis error');
            }
          });
        } catch (err) {
          if (err.name !== 'AbortError') showErrorLine(err.message || 'Network error');
        } finally {
          analyzeBtn.disabled = false;
        }
      });

      feedbackSend.addEventListener('click', async () => {
        const question = feedbackQ.value.trim();
        const company_name = companyInput.value.trim() || '—';
        if (!question) return;
        try {
          await fetch('/feedback', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ company_name, question }),
          });
        } catch (_) {}
        feedbackWrap.classList.add('hidden');
        feedbackThanks.classList.remove('hidden');
      });

      feedbackQ.addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter') feedbackSend.click();
      });
    })();
  </script>
</body>
</html>
