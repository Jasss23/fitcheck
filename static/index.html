<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitCheck — Clear fit signal from JD and profile </title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Berkeley+Mono&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg:        #080808;
      --surface:   #111111;
      --border:    #1e1e1e;
      --border-hi: #2e2e2e;
      --text:      #e2e2e2;
      --muted:     #555555;
      --dim:       #333333;
      --green:     #00e676;
      --green-dim: rgba(0,230,118,0.35);
      --amber:     #ffb300;
      --red:       #ff5252;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Geist', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ─────────────────────────────── */
    .layout {
      display: flex;
      height: 100dvh;
      overflow: hidden;
    }

    /* LEFT — terminal panel */
    .panel-left {
      width: 52%;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: #050505;
      position: relative;
      overflow: hidden;
    }

    /* subtle scanline texture */
    .panel-left::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.18) 3px,
        rgba(0,0,0,0.18) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* vignette */
    .panel-left::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 0;
    }

    .terminal-wrap {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 48px 52px;
      overflow: hidden;
    }

    /* Large wordmark anchor in terminal (~3×) */
    .terminal-brand {
      font-family: 'Berkeley Mono', monospace;
      font-size: 25px;
      letter-spacing: 0.12em;
      color: var(--green-dim);
      text-transform: uppercase;
      margin-bottom: 36px;
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .terminal-brand::before {
      content: '';
      display: inline-block;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 24px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* The big score shown in terminal after analysis */
    .terminal-score-display {
      display: none;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 40px;
    }
    .terminal-score-display.visible { display: flex; }
    .terminal-score-number {
      font-family: 'Berkeley Mono', monospace;
      font-size: clamp(100px, 18vw, 200px);
      line-height: 1;
      font-weight: 300;
      letter-spacing: -0.02em;
      color: var(--green);
      text-shadow: 0 0 50px rgba(0,230,118,0.25);
      transition: color 0.4s ease;
    }
    .terminal-score-number.amber { color: var(--amber); text-shadow: 0 0 60px rgba(255,179,0,0.2); }
    .terminal-score-number.gray  { color: #9e9e9e; text-shadow: 0 0 40px rgba(200,200,200,0.12); }
    .terminal-score-label {
      font-family: 'Berkeley Mono', monospace;
      font-size: 25px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Terminal lines area */
    #terminal-content {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0;
      scrollbar-width: none;
    }
    #terminal-content::-webkit-scrollbar { display: none; }

    .term-line {
      font-family: 'Berkeley Mono', monospace;
      font-size: 25px;
      line-height: 1.45;
      color: var(--green-dim);
      display: flex;
      align-items: baseline;
      gap: 14px;
      white-space: normal;
    }
    .term-line .prompt { color: var(--dim); flex-shrink: 0; font-size: 0.85em; }
    .term-line .text {
      color: rgba(0,230,118,0.65);
      max-width: 100%;
      word-break: break-word;
    }
    .term-line .status { flex-shrink: 0; font-size: 25px; min-width: 48px; line-height: 1; }
    .term-line.active .text { color: var(--green); text-shadow: 0 0 16px var(--green-dim); }
    .term-line.done .text   { color: rgba(0,230,118,0.35); }
    .term-line.done .status { color: rgba(0,230,118,0.35); }

    /* Last line after run: strong highlight */
    .term-line.complete-final {
      margin-top: 8px;
      padding: 12px 16px;
      margin-left: -16px;
      margin-right: -16px;
      border-radius: 4px;
      background: rgba(0, 230, 118, 0.12);
      border: 1px solid rgba(0, 230, 118, 0.35);
      box-shadow: 0 0 32px rgba(0, 230, 118, 0.15);
    }
    .term-line.complete-final .text {
      color: var(--green);
      text-shadow: 0 0 20px var(--green-dim);
      font-weight: 500;
    }
    .term-line.complete-final .prompt { color: var(--green); }

    .term-ascii {
      font-family: 'Berkeley Mono', monospace;
      font-size: 15px;
      line-height: 1.25;
      color: rgba(0, 230, 118, 0.55);
      margin-top: 28px;
      white-space: pre;
      user-select: none;
    }

    /* idle cursor (~3×) */
    .idle-block {
      font-family: 'Berkeley Mono', monospace;
      font-size: 30px;
      line-height: 1.45;
      color: rgba(0,230,118,0.5);
      display: flex;
      align-items: baseline;
      gap: 14px;
    }
    .cursor-rect {
      display: inline-block;
      width: 12px;
      height: 28px;
      background: var(--green);
      box-shadow: 0 0 18px var(--green);
      animation: blink 1.2s step-end infinite;
      vertical-align: bottom;
      margin-left: 1px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* RIGHT — input + results panel */
    .panel-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      background: var(--bg);
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .right-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 48px 52px 64px;
      max-width: 580px;
    }

    /* Header */
    .brand-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }
    .brand-tagline {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 40px;
    }

    /* Form */
    .field-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #ffffff;
      margin-bottom: 10px;
    }
    .field-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 11px 14px;
      font-size: 14px;
      font-family: 'Geist', system-ui, sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      resize: none;
    }
    .field-input::placeholder { color: var(--dim); }
    .field-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(0,230,118,0.1);
    }
    .field-group { margin-bottom: 16px; }

    .btn-primary {
      width: 100%;
      padding: 13px 16px;
      background: #161616;
      color: #ffffff;
      font-size: 14px;
      font-weight: 500;
      font-family: 'Geist', system-ui, sans-serif;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      margin-top: 8px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }
    .btn-primary:hover:not(:disabled) {
      background: #1c1c1c;
      border-color: rgba(255, 255, 255, 0.35);
    }
    .btn-primary:active:not(:disabled) { transform: translateY(1px); }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Results */
    #results {
      display: none;
      margin-top: 40px;
      animation: fadeUp 0.4s ease-out forwards;
    }
    #results.visible { display: block; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    /* Hero: big score + icon + badge */
    .results-score-hero {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .results-score-num {
      font-family: 'Berkeley Mono', monospace;
      font-size: 64px;
      line-height: 1;
      font-weight: 400;
      letter-spacing: -0.03em;
      color: var(--green);
      transition: color 0.35s ease;
    }
    .results-score-num.amber { color: var(--amber); }
    .results-score-num.gray  { color: #9e9e9e; }
    .results-score-suffix {
      font-size: 22px;
      font-weight: 500;
      color: var(--muted);
      align-self: flex-end;
      margin-bottom: 10px;
      margin-left: -8px;
    }
    .results-score-icon {
      width: 56px;
      height: 56px;
      flex-shrink: 0;
      color: var(--green);
    }
    .results-score-icon.amber { color: var(--amber); }
    .results-score-icon.gray  { color: #9e9e9e; }

    /* Score summary row */
    .score-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
    }
    .score-badge {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 100px;
      border: 1px solid currentColor;
      flex-shrink: 0;
    }
    .score-badge.green { color: var(--green); }
    .score-badge.amber { color: var(--amber); }
    .score-badge.gray  { color: #b0b0b0; border-color: rgba(255,255,255,0.25); }

    .reasoning-quote {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      font-style: italic;
      border-left: 2px solid var(--border-hi);
      padding-left: 14px;
      margin-bottom: 0;
    }

    /* Dimension bars */
    .dim-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .dim-label {
      font-size: 12px;
      color: var(--muted);
      width: 80px;
      flex-shrink: 0;
    }
    .dim-bar-track {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .dim-bar-fill {
      height: 100%;
      border-radius: 2px;
      width: 0%;
      transition: width 1s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .dim-bar-fill.green { background: var(--green); }
    .dim-bar-fill.amber { background: var(--amber); }
    .dim-bar-fill.gray  { background: var(--muted); }
    .dim-val {
      font-family: 'Berkeley Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      width: 28px;
      text-align: right;
      flex-shrink: 0;
    }

    /* Collapsible section */
    .collapsible-btn {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      font-size: 13px;
      font-family: 'Geist', system-ui, sans-serif;
      color: var(--muted);
      letter-spacing: 0.02em;
      transition: color 0.15s;
    }
    .collapsible-btn:hover { color: var(--text); }
    .collapsible-icon {
      font-family: 'Berkeley Mono', monospace;
      font-size: 11px;
      color: var(--dim);
    }
    .collapsible-panel { display: none; padding-top: 20px; }
    .collapsible-panel.open { display: block; }

    /* Report markdown */
    #report-md h1, #report-md h2, #report-md h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin: 20px 0 8px;
    }
    #report-md p {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.75;
      margin-bottom: 12px;
    }
    #report-md strong { color: #999; font-weight: 500; }
    #report-md ul, #report-md ol {
      margin: 8px 0 12px 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.75;
    }

    /* HR feedback */
    .hr-section {
      display: none;
      padding-top: 24px;
      margin-top: 24px;
      border-top: 1px solid var(--border);
    }
    .hr-section.visible { display: block; }
    .hr-label {
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      line-height: 1.45;
      margin-bottom: 14px;
    }
    .hr-row {
      display: flex;
      gap: 8px;
    }
    .btn-secondary {
      padding: 10px 18px;
      background: #141414;
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 6px;
      color: #ffffff;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Geist', system-ui, sans-serif;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.15s, background 0.15s;
      flex-shrink: 0;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }
    .btn-secondary:hover {
      border-color: rgba(255, 255, 255, 0.45);
      background: #1a1a1a;
    }

    /* Spinner */
    @keyframes spin-frames {
      to { --idx: 10; }
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- ═══════════════════════════════════════
       LEFT — Terminal
  ════════════════════════════════════════ -->
  <aside class="panel-left">
    <div class="terminal-wrap">

      <div class="terminal-brand">
        fitcheck · v1.0
      </div>

      <!-- Big score shown after analysis -->
      <div id="terminal-score" class="terminal-score-display">
        <div id="term-score-number" class="terminal-score-number">—</div>
        <div class="terminal-score-label">overall fit score</div>
      </div>

      <!-- Terminal lines / idle -->
      <div id="terminal-content">
        <div id="idle-line" class="idle-block">
          <span style="color:var(--dim)">$</span>
          <span>fitcheck --ready</span>
          <span class="cursor-rect"></span>
        </div>
        <!-- step lines injected here -->
      </div>

    </div>
  </aside>

  <!-- ═══════════════════════════════════════
       RIGHT — Input + Results
  ════════════════════════════════════════ -->
  <main class="panel-right">
    <div class="right-inner">

      <div class="brand-name">FitCheck</div>
      <div class="brand-tagline">Know your fit before you apply</div>

      <!-- Form -->
      <div class="field-group">
        <div class="field-label">Company</div>
        <input id="company" type="text" class="field-input" placeholder="e.g. Grab Singapore" autocomplete="organization" />
      </div>

      <div class="field-group">
        <div class="field-label">Job Description</div>
        <textarea id="jd" class="field-input" rows="7" placeholder="Paste the full job description here…" maxlength="8000"></textarea>
      </div>

      <button id="analyze-btn" class="btn-primary">Analyze Fit →</button>

      <!-- Results -->
      <div id="results">

        <div class="results-score-hero">
          <div style="display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;">
            <span id="score-main" class="results-score-num">—</span>
            <span class="results-score-suffix">/100</span>
          </div>
          <svg id="score-icon" class="results-score-icon" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="28" cy="28" r="25" stroke="currentColor" stroke-width="2" opacity="0.4"/>
            <path d="M17 28.5 L24.5 37 L39 19" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <!-- Score row: badge + company -->
        <div class="score-row">
          <span id="rec-badge" class="score-badge gray">—</span>
          <span id="result-company" style="font-size:13px;color:var(--muted)"></span>
        </div>

        <!-- Reasoning -->
        <p id="reasoning-box" class="reasoning-quote" style="display:none"></p>

        <div class="divider"></div>

        <!-- Dimension bars -->
        <div id="dims-section">
          <div class="dim-row">
            <span class="dim-label">Technical</span>
            <div class="dim-bar-track"><div id="bar-tech" class="dim-bar-fill gray"></div></div>
            <span id="val-tech" class="dim-val">—</span>
          </div>
          <div class="dim-row">
            <span class="dim-label">Domain</span>
            <div class="dim-bar-track"><div id="bar-domain" class="dim-bar-fill gray"></div></div>
            <span id="val-domain" class="dim-val">—</span>
          </div>
          <div class="dim-row">
            <span class="dim-label">Experience</span>
            <div class="dim-bar-track"><div id="bar-exp" class="dim-bar-fill gray"></div></div>
            <span id="val-exp" class="dim-val">—</span>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Full report collapsible -->
        <button class="collapsible-btn" onclick="togglePanel('panel-report','icon-report')">
          <span style="color:#fff;">Full Report</span>
          <span id="icon-report" class="collapsible-icon">▾</span>
        </button>
        <div id="panel-report" class="collapsible-panel">
          <div id="report-md"></div>
        </div>

        <!-- HR section -->
        <div id="hr-section" class="hr-section">
          <div class="hr-label">Hiring manager? I'd love to know what you're thinking.</div>
          <div id="feedback-wrap" class="hr-row">
            <input id="feedback-q" type="text" class="field-input" placeholder="What's your first question for this candidate?" style="flex:1" />
            <button id="feedback-send" class="btn-secondary">Send</button>
          </div>
          <p id="feedback-thanks" style="display:none;font-size:13px;color:var(--muted);margin-top:12px;">Thanks — noted.</p>
        </div>

      </div>
    </div>
  </main>
</div>

<script>
(function () {
  const SPINNER = ['⠋','⠙','⠹','⠸','⠼','⠴','⠦','⠧','⠇','⠏'];
  let spinnerInterval = null;
  let currentStepEl = null;
  let spinIdx = 0;
  let sseAbort = null;
  let lastCompanyName = '';

  const $company    = document.getElementById('company');
  const $jd         = document.getElementById('jd');
  const $btn        = document.getElementById('analyze-btn');
  const $results    = document.getElementById('results');
  const $idleLine   = document.getElementById('idle-line');
  const $termContent= document.getElementById('terminal-content');
  const $termScore  = document.getElementById('terminal-score');
  const $termScoreN = document.getElementById('term-score-number');
  const $recBadge   = document.getElementById('rec-badge');
  const $scoreMain  = document.getElementById('score-main');
  const $scoreIcon  = document.getElementById('score-icon');
  const $resultCo   = document.getElementById('result-company');
  const $reasoning  = document.getElementById('reasoning-box');
  const $reportMd   = document.getElementById('report-md');
  const $hrSection  = document.getElementById('hr-section');
  const $fbWrap     = document.getElementById('feedback-wrap');
  const $fbQ        = document.getElementById('feedback-q');
  const $fbSend     = document.getElementById('feedback-send');
  const $fbThanks   = document.getElementById('feedback-thanks');

  // ── Collapsible ───────────────────────────
  window.togglePanel = function(panelId, iconId) {
    const panel = document.getElementById(panelId);
    const icon  = document.getElementById(iconId);
    const open  = panel.classList.toggle('open');
    icon.textContent = open ? '▴' : '▾';
  };

  // ── Terminal helpers ──────────────────────
  function stopSpinner() {
    if (spinnerInterval) { clearInterval(spinnerInterval); spinnerInterval = null; }
  }

  function markDone() {
    stopSpinner();
    if (currentStepEl) {
      const st = currentStepEl.querySelector('.status');
      if (st) st.textContent = '✓';
      currentStepEl.classList.remove('active');
      currentStepEl.classList.add('done');
      currentStepEl = null;
    }
  }

  function addStep(label) {
    markDone();
    // hide idle
    $idleLine.style.display = 'none';

    const row = document.createElement('div');
    row.className = 'term-line active';
    row.innerHTML = `
      <span class="prompt">$</span>
      <span class="text">${label}</span>
      <span class="status">${SPINNER[0]}</span>
    `;
    $termContent.appendChild(row);
    $termContent.scrollTop = $termContent.scrollHeight;
    currentStepEl = row;

    spinIdx = 0;
    spinnerInterval = setInterval(() => {
      spinIdx = (spinIdx + 1) % SPINNER.length;
      const s = row.querySelector('.status');
      if (s) s.textContent = SPINNER[spinIdx];
    }, 90);
  }

  const ASCII_THANKS = [
    '',
    '   .-------------------------------------------.',
    '   |                                           |',
    '   |     *  T H A N K   Y O U  *               |',
    '   |                                           |',
    '   |           - Jiashun Pang                  |',
    '   |                                           |',
    '   `-------------------------------------------\'',
    '',
  ].join('\n');

  function addCompleteLine() {
    markDone();
    const row = document.createElement('div');
    row.className = 'term-line complete-final';
    row.innerHTML = `<span class="prompt">$</span><span class="text">Analysis Completed ✓</span>`;
    $termContent.appendChild(row);

    const art = document.createElement('pre');
    art.className = 'term-ascii';
    art.textContent = ASCII_THANKS;
    $termContent.appendChild(art);

    $termContent.scrollTop = $termContent.scrollHeight;
  }

  function resetTerminal() {
    stopSpinner();
    currentStepEl = null;
    // remove all step lines
    Array.from($termContent.querySelectorAll('.term-line, .term-ascii')).forEach(el => el.remove());
    $idleLine.style.display = 'flex';
    $termScore.classList.remove('visible');
  }

  function showTerminalScore(score) {
    const n = Number(score) || 0;
    $termScoreN.textContent = String(Math.round(n));
    $termScoreN.className = 'terminal-score-number';
    if (n >= 60) { /* green default */ }
    else if (n >= 30) $termScoreN.classList.add('amber');
    else $termScoreN.classList.add('gray');
    $termScore.classList.add('visible');
  }

  // ── Score / results helpers ───────────────
  function tier(n) {
    if (n >= 60) return 'green';
    if (n >= 30) return 'amber';
    return 'gray';
  }

  function setBar(fillId, valId, v) {
    const fill = document.getElementById(fillId);
    const val  = document.getElementById(valId);
    const t    = v >= 6 ? 'green' : v >= 3 ? 'amber' : 'gray';
    fill.className = `dim-bar-fill ${t}`;
    fill.style.width = '0%';
    requestAnimationFrame(() => {
      fill.style.width = Math.min(100, v * 10) + '%';
    });
    val.textContent = v + '/10';
  }

  function renderResults(r) {
    const fs = r.fit_score || {};
    const n  = Number(fs.overall_score) || 0;
    const t  = tier(n);
    const bd = fs.breakdown || {};

    // Hero score + icon
    $scoreMain.textContent = String(Math.round(n));
    $scoreMain.className = 'results-score-num';
    $scoreIcon.className = 'results-score-icon';
    if (t === 'amber') {
      $scoreMain.classList.add('amber');
      $scoreIcon.classList.add('amber');
    } else if (t === 'gray') {
      $scoreMain.classList.add('gray');
      $scoreIcon.classList.add('gray');
    }

    // Badge
    $recBadge.textContent = fs.recommendation || '—';
    $recBadge.className   = `score-badge ${t}`;
    $resultCo.textContent = r.company || '';

    // Reasoning
    if (fs.reasoning) {
      $reasoning.textContent = fs.reasoning;
      $reasoning.style.display = 'block';
    } else {
      $reasoning.style.display = 'none';
    }

    // Bars
    setBar('bar-tech',   'val-tech',   Number(bd.technical)  || 0);
    setBar('bar-domain', 'val-domain', Number(bd.domain)     || 0);
    setBar('bar-exp',    'val-exp',    Number(bd.experience) || 0);

    // Report
    $reportMd.innerHTML = marked.parse(r.report || '_No report._', { breaks: true });

    // Reset collapsible
    document.getElementById('panel-report').classList.remove('open');
    document.getElementById('icon-report').textContent = '▾';

    // HR
    $hrSection.classList.add('visible');
    $fbWrap.style.display = 'flex';
    $fbThanks.style.display = 'none';
    $fbQ.value = '';

    // Show results
    $results.classList.add('visible');
    $results.style.display = 'block';

    // Terminal score
    showTerminalScore(n);
  }

  // ── SSE reader ────────────────────────────
  async function readSSE(response, onEvent) {
    const reader  = response.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop() || '';
      for (const chunk of parts) {
        for (const line of chunk.split('\n')) {
          if (line.startsWith('data:')) {
            try { onEvent(JSON.parse(line.slice(5).trim())); }
            catch (e) { console.warn('SSE parse error', e); }
          }
        }
      }
    }
  }

  // ── Submit ────────────────────────────────
  $btn.addEventListener('click', async () => {
    const company_name = $company.value.trim();
    const jd_text      = $jd.value.trim();
    if (!company_name || !jd_text) return;

    lastCompanyName = company_name;

    if (sseAbort) sseAbort.abort();
    sseAbort = new AbortController();

    $btn.disabled = true;
    resetTerminal();
    $results.style.display = 'none';
    $results.classList.remove('visible');

    try {
      const res = await fetch('/analyze/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ company_name, jd_text }),
        signal: sseAbort.signal,
      });

      if (!res.ok) {
        addStep('Error: request failed (' + res.status + ')');
        $btn.disabled = false;
        return;
      }

      await readSSE(res, (data) => {
        if (data.type === 'step' && data.label) {
          addStep(data.label);
        } else if (data.type === 'complete' && data.result) {
          addCompleteLine();
          renderResults(data.result);
        } else if (data.type === 'error') {
          addStep('Error: ' + (data.message || 'something went wrong'));
        }
      });
    } catch (err) {
      if (err.name !== 'AbortError') {
        addStep('Network error: ' + (err.message || 'unknown'));
      }
    } finally {
      $btn.disabled = false;
    }
  });

  // Enter key in company field moves to JD
  $company.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); $jd.focus(); }
  });

  // ── Feedback ──────────────────────────────
  $fbSend.addEventListener('click', async () => {
    const question = $fbQ.value.trim();
    if (!question) return;
    try {
      await fetch('/feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ company_name: lastCompanyName || '—', question }),
      });
    } catch (_) {}
    $fbWrap.style.display = 'none';
    $fbThanks.style.display = 'block';
  });

  $fbQ.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') $fbSend.click();
  });

})();
</script>
</body>
</html>
