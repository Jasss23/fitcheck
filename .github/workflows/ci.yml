name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # use uv's official action, faster than setup-python + pip
      # it automatically reads requires-python in pyproject.toml to decide which Python to use
      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --group dev
        # uv sync will:
        # 1. read the exact versions locked in uv.lock
        # 2. install all dependencies, including dev group
        # this ensures the CI and local use the exact same version tree

      - name: Run tests
        run: uv run pytest tests/ -v
        # uv run will execute commands in the uv managed virtual environment
        # no need to activate .venv first
        env:
          GOOGLE_API_KEY: "test-key-ci-placeholder"   # real key not needed: LLM calls are mocked
          TAVILY_API_KEY: "test-key-ci-placeholder"   # real key not needed: search_company not called in unit tests
          # GOOGLE_CLOUD_PROJECT intentionally unset — Vertex AI embedding tests are skipped in CI

